<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Recrutement Collège</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<header>PORTAIL DE RECRUTEMENT COLLÈGE</header>

<div class="container">

<div class="card">
<h3>Mathématiques</h3>
<div class="desc">Algèbre, géométrie, fonctions et logique.</div>
<button class="btn" onclick="openForm('Mathématiques')">Candidater</button>
</div>

<div class="card">
<h3>Français</h3>
<div class="desc">Grammaire, littérature et expression écrite.</div>
<button class="btn" onclick="openForm('Français')">Candidater</button>
</div>

<div class="card">
<h3>Histoire-Géo</h3>
<div class="desc">Histoire mondiale et géographie.</div>
<button class="btn" onclick="openForm('Histoire-Géo')">Candidater</button>
</div>

<div class="card">
<h3>Ressources Humaines</h3>
<div class="desc">Gestion du personnel et recrutement (URGENT).</div>
<button class="btn" onclick="openForm('RH')">Candidater</button>
</div>

</div>

<!-- FORMULAIRE -->
<div id="form">
<form onsubmit="send(event)">
<h3>Candidature</h3>

<input id="rp" placeholder="Nom RP" required>
<input id="exp" placeholder="Expérience RP" required>
<input id="dispo" placeholder="Disponibilité" required>
<input id="discord" placeholder="Discord" required>

<button class="btn" type="submit">Envoyer</button>
</form>
</div>

<script src="script.js"></script>

</body>
</html>
